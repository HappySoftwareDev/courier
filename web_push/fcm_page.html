<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Firebase Web Push Notification Example</h2>

<p id="token"></p>
<script src="https://www.gstatic.com/firebasejs/8.9.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.9.0/firebase-messaging.js"></script>
<script src="../js/vendor/jquery-1.9.1.min.js"></script>
<script>
    var firebaseConfig = {
        apiKey: "AIzaSyCSNGUwzJ0iXTz01MAWsfec5jbTWvbCYC8",
		authDomain: "merchant-booking.firebaseapp.com",
		databaseURL: "https://merchant-booking.firebaseio.com",
		projectId: "merchant-booking",
		storageBucket: "merchant-booking.appspot.com",
		messagingSenderId: "909204433162",
		appId: "1:909204433162:web:cd5165ba87c3e131ccb2f3"
        //measurementId: "YOUR MEASUREMENT ID"
    };
    firebase.initializeApp(firebaseConfig);
    const messaging=firebase.messaging();

    function IntitalizeFireBaseMessaging() {
        messaging
            .requestPermission()
            .then(function () {
                console.log("Notification Permission");
                return messaging.getToken();
            })
            .then(function (token) {
                console.log("Token : "+token);
                document.getElementById("token").innerHTML=token;
                $.ajax({
                url: 'save_token.php',
                type: 'POST',
                data: 'token=' + token,
                success: function(result) {
                    if(result == "OK"){
                        console.log("token saved");
                    }
                    else if(result == "exist"){
                        console.log("token already exist")
                    };
                }
                 });
            })
            .catch(function (reason) {
                console.log(reason);
            });
    }

    messaging.onMessage(function (payload) {
        console.log(payload);
        const notificationOption={
            body:payload.notification.body,
            icon:payload.notification.icon
        };

        if(Notification.permission==="granted"){
            var notification=new Notification(payload.notification.title,notificationOption);

            notification.onclick=function (ev) {
                ev.preventDefault();
                window.open(payload.notification.click_action,'_blank');
                notification.close();
            }
        }

    });
    messaging.onTokenRefresh(function () {
        messaging.getToken()
            .then(function (newtoken) {
                console.log("New Token : "+ newtoken);
            })
            .catch(function (reason) {
                console.log(reason);
            })
    })
    IntitalizeFireBaseMessaging();
</script>
</body>
</html>
